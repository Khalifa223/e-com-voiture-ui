<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <title>Dashboard vendeur</title>
</head>
<style>
    body {
        background: #f2f4f8;
    }

    .dashboard-container {
        max-width: 600px;
        margin: auto;
        padding: 20px;
    }

    .card-custom {
        border: none;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }

    .card-custom img {
        border-radius: 15px 15px 0 0;
    }

    .price {
    color: #c0392b;   /* Rouge pour le montant */
    font-weight: bold;
    font-size: 22px;
}

.currency {
    color: #555;      /* Gris foncé comme sur ton image */
    font-weight: 500;
}

    .status-badge {
        font-size: 14px;
        padding: 6px 12px;
        border-radius: 8px;
    }

    .btn-blue {
        background: linear-gradient(to right, #3b5998, #2c3e75);
        color: white;
        border-radius: 12px;
        padding: 15px;
        font-weight: 500;
    }

    .btn-blue:hover {
        color: white;
    }

    .card-custom {
        transition: 0.3s;
    }

    .card-custom:hover {
        transform: translateY(-5px);
    }
</style>

<body>

    <body>

        <div class="dashboard-container">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <i class="bi bi-arrow-left fs-4"></i>
                <h4 class="fw-bold">Mon Tableau de Bord</h4>
                <i class="bi bi-bell fs-4"></i>
            </div>

            <!-- BOUTON PUBLIER -->
            <div class="mb-4">
                <button class="btn btn-blue w-100">
                    <i class="bi bi-plus-lg"></i> Publier une annonce
                </button>
            </div>

            <h5 class="fw-bold mb-3">Mes annonces</h5>

            <!-- PREMIERE CARTE (Grande image) -->
            <div class="card card-custom mb-4">
                <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2" class="card-img-top">

                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="price">7 500 000 FCFA</div>
                        <span class="badge bg-success status-badge">Active</span>
                    </div>

                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-outline-secondary w-50">
                            <i class="bi bi-pencil"></i> Modifier
                        </button>
                        <button class="btn btn-danger w-50">
                            <i class="bi bi-trash"></i> Supprimer
                        </button>
                    </div>
                </div>
            </div>

            <!-- CARTE 2 -->
            <div class="card card-custom mb-4 p-3">
                <div class="row g-3 align-items-center">
                    <div class="col-4">
                        <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2"
                            class="img-fluid rounded">
                    </div>
                    <div class="col-8">
                        <h6 class="fw-bold">Toyota RAV4 2018</h6>
                        <div class="price">
                            7 500 000 <span class="currency">FCFA</span>
                        </div>
                        <span class="badge bg-success status-badge mt-1">Active</span>

                        <div class="d-flex gap-2 mt-2">
                            <button class="btn btn-outline-secondary btn-sm w-50">
                                <i class="bi bi-pencil"></i> Modifier
                            </button>
                            <button class="btn btn-danger btn-sm w-50">
                                <i class="bi bi-trash"></i> Supprimer
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CARTE 3 -->
            <div class="card card-custom mb-4 p-3">
                <div class="row g-3 align-items-center">
                    <div class="col-4">
                        <img src="https://images.unsplash.com/photo-1590362891991-f776e747a588"
                            class="img-fluid rounded">
                    </div>
                    <div class="col-8">
                        <h6 class="fw-bold">Kia Sportage EX 2017</h6>
                         <div class="price">
                            5 900 000 <span class="currency">FCFA</span>
                        </div>
                        <span class="badge bg-warning text-dark status-badge mt-1">En attente</span>

                        <div class="d-flex gap-2 mt-2">
                            <button class="btn btn-outline-secondary btn-sm w-50">
                                <i class="bi bi-pencil"></i> Modifier
                            </button>
                            <button class="btn btn-danger btn-sm w-50">
                                <i class="bi bi-trash"></i> Supprimer
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CARTE 4 -->
            <div class="card card-custom mb-4 p-3">
                <div class="row g-3 align-items-center">
                    <div class="col-4">
                        <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d" class="img-fluid rounded">
                    </div>
                    <div class="col-8">
                        <h6 class="fw-bold">Nissan Qashqai 2016</h6>
                        <div class="price">5 100 000 <span class="currency">FCFA</div>
                        <span class="badge bg-danger status-badge mt-1">Refusée</span>

                        <div class="d-flex gap-2 mt-2">
                            <button class="btn btn-outline-secondary btn-sm w-50">
                                <i class="bi bi-pencil"></i> Modifier
                            </button>
                            <button class="btn btn-danger btn-sm w-50">
                                <i class="bi bi-trash"></i> Supprimer
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </body>

</body>

</html>
