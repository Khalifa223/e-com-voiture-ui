<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publier une annonce</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f4f5f9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.mobile-container{
    max-width:420px;
    margin:auto;
    padding:15px;
}

.card-custom{
    background:#fff;
    border-radius:16px;
    padding:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.06);
    margin-bottom:15px;
}

.form-control, .form-select{
    border-radius:12px;
    border:1px solid #e5e7eb;
    padding:12px;
    font-size:15px;
}

.form-label{
    font-weight:600;
    font-size:14px;
}

.text-muted-small{
    font-size:13px;
    color:#6b7280;
}

.photo-box{
    height:90px;
    border-radius:12px;
    border:2px dashed #d1d5db;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#f9fafb;
    color:#3b5bdb;
    font-weight:500;
}

.photo-thumb{
    height:90px;
    width:90px;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    margin-right:10px;
}

.photo-thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.remove-btn{
    position:absolute;
    top:5px;
    right:5px;
    background:#dc3545;
    color:white;
    border-radius:50%;
    width:20px;
    height:20px;
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.btn-publish{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    color:white;
    font-size:18px;
    font-weight:600;
    background:linear-gradient(135deg,#3b5bdb,#2f4bcf);
    box-shadow:0 6px 18px rgba(59,91,219,0.3);
}

.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:15px;
}

.header h5{
    font-weight:600;
}

.radio-group{
    display:flex;
    gap:20px;
}

</style>
</head>

<body>

<div class="mobile-container">

<!-- Header -->
<div class="header">
    <i class="bi bi-arrow-left fs-4"></i>
    <h5>Publier une annonce</h5>
    <i class="bi bi-bell fs-4"></i>
</div>

<p class="text-muted-small">
Remplissez le formulaire ci-dessous pour publier votre annonce de voiture.
</p>

<!-- Photos -->
<div class="card-custom">
    <label class="form-label">Vos photos (5 max)*</label>
    <div class="d-flex mt-2 overflow-auto">

        <div class="photo-box me-2">
            <i class="bi bi-plus fs-4"></i>
            <small>Ajouter photo</small>
        </div>

        <div class="photo-thumb">
            <img src="https://images.unsplash.com/photo-1549924231-f129b911e442" alt="">
            <div class="remove-btn">x</div>
        </div>

        <div class="photo-thumb">
            <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d" alt="">
            <div class="remove-btn">x</div>
        </div>

        <div class="photo-thumb">
            <img src="https://images.unsplash.com/photo-1583267746897-2cf415887172" alt="">
            <div class="remove-btn">x</div>
        </div>

    </div>
</div>

<!-- Form Row 1 -->
<div class="row g-3">
<div class="col-6">
    <div class="card-custom">
        <label class="form-label">Marque *</label>
        <select class="form-select">
            <option>Toyota</option>
        </select>
    </div>
</div>

<div class="col-6">
    <div class="card-custom">
        <label class="form-label">Modèle *</label>
        <select class="form-select">
            <option>RAV4</option>
        </select>
    </div>
</div>
</div>

<!-- Row 2 -->
<div class="row g-3 mt-1">
<div class="col-6">
    <div class="card-custom">
        <label class="form-label">Année *</label>
        <select class="form-select">
            <option>2018</option>
        </select>
    </div>
</div>

<div class="col-6">
    <div class="card-custom">
        <label class="form-label">Kilométrage *</label>
        <input type="text" class="form-control" value="85 000 km">
    </div>
</div>
</div>

<!-- Prix -->
<div class="card-custom mt-3">
    <label class="form-label">Prix *</label>
    <input type="text" class="form-control mb-3" value="7 500 000 FCFA">

    <div class="radio-group">
        <div>
            <input type="radio" name="etat"> Neuf
        </div>
        <div>
            <input type="radio" name="etat"> Occasion
        </div>
    </div>
</div>

<!-- Carburant + Transmission -->
<div class="row g-3 mt-1">
<div class="col-6">
    <div class="card-custom">
        <label class="form-label">Carburant *</label>
        <select class="form-select">
            <option>Essence</option>
        </select>
    </div>
</div>

<div class="col-6">
    <div class="card-custom">
        <label class="form-label">Transmission *</label>
        <select class="form-select">
            <option>Automatique</option>
        </select>
    </div>
</div>
</div>

<!-- Ville -->
<div class="card-custom mt-3">
    <label class="form-label">Ville *</label>
    <input type="text" class="form-control" value="Bamako">
</div>

<!-- Description -->
<div class="card-custom">
    <label class="form-label">Description *</label>
    <textarea class="form-control" rows="3">Vehicule en très bon état, jamais accidenté...</textarea>
    <div class="text-end text-muted-small mt-1">180/500 caractères</div>
</div>

<!-- Bouton -->
<button class="btn-publish mt-3">Publier</button>

</div>

</body>
</html>
