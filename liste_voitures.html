<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liste des voitures</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

/* GENERAL */
body{
    background-color:#f3f4f6;
    font-family: 'Segoe UI', sans-serif;
}

/* FILTRE */
.sidebar{
    background:white;
    border-right:1px solid #e5e7eb;
}

.filter-box{
    background:#f8f9fa;
    border-radius:10px;
    padding:12px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:500;
}

.reset-btn{
    background:#e53935;
    color:white;
    font-weight:bold;
    border-radius:10px;
}

.reset-btn:hover{
    background:#c62828;
}

/* CARD VOITURE */
.car-card{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.car-title{
    font-weight:700;
    font-size:20px;
}

.price{
    font-size:22px;
    font-weight:bold;
    color:#e53935;
}

.fcfa{
    color:#1a2b49;
}

.badge-custom{
    background:#2e7d32;
    color:white;
    font-size:12px;
    padding:6px 10px;
    border-radius:20px;
}

.badge-blue{
    background:#1a3c78;
    color:white;
    font-size:12px;
    padding:6px 10px;
    border-radius:20px;
}

.btn-details{
    background:#1a3c78;
    color:white;
    border-radius:10px;
    font-weight:600;
}

.btn-details:hover{
    background:#142f5c;
    color:white;
}

.btn-contact{
    background:#e53935;
    color:white;
    border-radius:10px;
    font-weight:600;
}

.btn-contact:hover{
    background:#c62828;
    color:white;
}

/* MOBILE */
@media(max-width:768px){
    .sidebar{
        border-right:none;
        margin-bottom:20px;
    }
    .car-img{
        width:100%;
        border-radius:15px;
        margin-bottom:10px;
    }
}

</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- ================= FILTRES ================= -->
<div class="col-lg-3 col-md-4 col-12 sidebar p-3">

<div class="mb-3 d-flex align-items-center">
<i class="bi bi-check-circle-fill text-success me-2"></i>
<strong>387 Résultats</strong>
</div>

<div class="mb-3">
<label class="fw-bold">Marque</label>
<div class="filter-box">Toyota <i class="bi bi-chevron-right"></i></div>
</div>

<div class="mb-3">
<label class="fw-bold">Prix Min</label>
<div class="filter-box">10 000 000 <i class="bi bi-chevron-right"></i></div>
</div>

<div class="mb-3">
<label class="fw-bold">Ville</label>
<div class="filter-box">Tous <i class="bi bi-chevron-right"></i></div>
</div>

<div class="mb-3">
<label class="fw-bold">Année</label>
<div class="filter-box">2015+ <i class="bi bi-chevron-right"></i></div>
</div>

<div class="mb-3">
<label class="fw-bold">Kilométrage</label>
<div class="filter-box">≤ 100 000 km <i class="bi bi-chevron-right"></i></div>
</div>

<div class="mb-3">
<label class="fw-bold">Type</label>
<div class="filter-box">SUV <i class="bi bi-chevron-right"></i></div>
</div>

<div class="form-check mb-2">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Vendeur Vérifié</label>
</div>

<div class="form-check mb-2">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Négociable</label>
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Disponible sur WhatsApp</label>
</div>

<button class="btn reset-btn w-100 mb-3">RÉINITIALISER</button>

<div class="text-center">
<span class="me-2 fw-bold">1</span>
<span class="me-2">2</span>
<span class="me-2">3</span>
<span class="me-2">4</span>
<span>→</span>
</div>

<button class="btn btn-light w-100 mt-3 rounded-pill">Charger plus...</button>

</div>

<!-- ================= LISTE VOITURES ================= -->
<div class="col-lg-9 col-md-8 col-12 p-3">

<!-- CARD 1 -->
<div class="car-card">
<div class="row align-items-center">
<div class="col-md-4">
<img src="assets/images/Rv4.webp" class="img-fluid rounded-3 car-img">
</div>
<div class="col-md-8">
<div class="car-title">Toyota RAV4 2018</div>
<div class="price">7 500 000 <span class="fcfa">FCFA</span></div>

<p class="mb-1"><i class="bi bi-check-circle-fill text-success"></i> 85 000 km</p>
<p class="mb-2"><i class="bi bi-geo-alt-fill text-success"></i> Bamako</p>

<div class="mb-3">
<span class="badge-custom">Vendeur Vérifié</span>
<span class="badge-custom">Bon achetete</span>
<span class="badge-blue">Nouvelle Annonce</span>
</div>

<div class="d-flex gap-2">
<button class="btn btn-details w-50">Voir details</button>
<button class="btn btn-contact w-50"><i class="bi bi-telephone-fill"></i> Contacter</button>
</div>
</div>
</div>
</div>

<!-- CARD 2 -->
<div class="car-card">
<div class="row align-items-center">
<div class="col-md-4">
<img src="assets/images/voiture-2.jpg" class="img-fluid rounded-3 car-img">
</div>
<div class="col-md-8">
<div class="car-title">Nissan Qashqai 2017</div>
<div class="price">5 100 000 <span class="fcfa">FCFA</span></div>

<p class="mb-1"><i class="bi bi-check-circle-fill text-success"></i> 70 000 km</p>
<p class="mb-2"><i class="bi bi-geo-alt-fill text-success"></i> Kayes</p>

<div class="mb-3">
<span class="badge-custom">Vendeur Vérifié</span>
<span class="badge-custom">Bon offre</span>
<span class="badge-custom">Négociable</span>
</div>

<div class="d-flex gap-2">
<button class="btn btn-details w-50">Voir details</button>
<button class="btn btn-contact w-50"><i class="bi bi-telephone-fill"></i> Contacter</button>
</div>
</div>
</div>
</div>

</div>

</div>
</div>

</body>
</html>
